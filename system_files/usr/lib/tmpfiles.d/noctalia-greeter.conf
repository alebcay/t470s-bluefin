d /var/lib/noctalia-greeter 0755 greetd greetd -
C /var/lib/noctalia-greeter/greeter.toml 0644 greetd greetd - /usr/share/factory/var/lib/noctalia-greeter/greeter.toml

# Fontconfig needs a writable cache dir for users without a real home;
# greetd's home is /var/lib/greetd so we create .cache up front.
d /var/lib/greetd/.cache 0755 greetd greetd -

---
name: Update RPM Lockfile

on:
  schedule:
    - cron: '32 14 * * *'  # Daily 14:32 UTC
  workflow_dispatch:

jobs:
  resolve:
    name: Regenerate lockfile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check for base image update
        id: base
        run: |
          CURRENT_DIGEST=$(skopeo inspect docker://ghcr.io/projectbluefin/bluefin:stable --format '{{.Digest}}')
          PINNED_DIGEST=$(grep '^FROM ' Containerfile | grep -oP 'sha256:[a-f0-9]+')
          echo "current=${CURRENT_DIGEST}"
          echo "pinned=${PINNED_DIGEST}"
          if [ "${CURRENT_DIGEST}" != "${PINNED_DIGEST}" ]; then
            echo "Base image updated: ${PINNED_DIGEST} -> ${CURRENT_DIGEST}"
            sed -i "s|ghcr.io/projectbluefin/bluefin@${PINNED_DIGEST}|ghcr.io/projectbluefin/bluefin@${CURRENT_DIGEST}|" Containerfile
          fi
          echo "digest=${CURRENT_DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Resolve lockfile
        run: |
          podman run --rm \
            -v "${{ github.workspace }}:/work:Z" \
            -w /work \
            "ghcr.io/projectbluefin/bluefin@${{ steps.base.outputs.digest }}" \
            bash -c '
              dnf5 -y config-manager addrepo \
                --from-repofile=https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
              dnf5 -y install terra-release
              dnf5 -y copr enable abn/throttled
              dnf5 -y copr enable sneexy/python-validity
              dnf5 -y copr enable lionheartp/Hyprland
              dnf5 -y install dnf5-plugin-manifest libpkgmanifest
              dnf5 manifest resolve --input build_files/rpms.in.yaml
              mv packages.manifest.yaml build_files/packages.manifest.yaml
            '

      - name: Upload lockfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lockfile
          path: build_files/packages.manifest.yaml
          retention-days: 1

      - name: Upload Containerfile
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: containerfile
          path: Containerfile
          retention-days: 1

  pull-request:
    name: Create Pull Request
    needs: resolve
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: true

      - name: Checkout PR branch if it exists
        id: branch
        run: |
          BRANCH="automated/lockfile-update"
          git fetch origin main
          git checkout -B "$BRANCH"
          git reset --hard origin/main
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Download lockfile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: lockfile
          path: build_files/

      - name: Download Containerfile
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: containerfile
          path: ./

      - name: Create or update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ steps.branch.outputs.branch }}"
          git add Containerfile build_files/packages.manifest.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update base image and RPM lockfile"
          git push -u origin "$BRANCH" --force
          PR_EXISTS=$(gh pr list --head "$BRANCH" --state open --json number --jq 'if .[0].number then "true" else "false" end')
          if [ "$PR_EXISTS" != "true" ]; then
            PR_NUMBER=$(gh pr create \
              --title "chore: update base image and RPM lockfile" \
              --body "Automated daily update of the RPM package lockfile from \`build_files/rpms.in.yaml\`." \
              --base main)
            echo "Created PR #$PR_NUMBER"
          else
            PR_NUMBER=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
            echo "PR #$PR_NUMBER already exists, updated with new lockfile"
          fi
